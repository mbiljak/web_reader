<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      width: 280px;
      padding: 16px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      color: #89b4fa;
    }
    .hint {
      font-size: 11px;
      color: #6c7086;
      margin-bottom: 14px;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      background: #313244;
      color: #cdd6f4;
      transition: background 0.15s;
    }
    button:hover { background: #45475a; }
    button:disabled { opacity: 0.35; cursor: default; }
    #btn-play  { color: #a6e3a1; }
    #btn-pause { color: #f9e2af; }
    #btn-stop  { color: #f38ba8; }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .row label { color: #a6adc8; white-space: nowrap; }
    input[type=range] { flex: 1; accent-color: #89b4fa; }
    #speed-value { width: 32px; text-align: right; color: #a6adc8; }
    select {
      flex: 1;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 5px;
      padding: 5px;
      font-size: 12px;
      max-width: 200px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #a6adc8;
      margin-bottom: 4px;
    }
    .toggle-row input { accent-color: #89b4fa; width: 16px; height: 16px; }
  </style>
</head>
<body>
  <h1>Web Reader</h1>
  <p class="hint">Select text first to read just that — otherwise the whole article is read.<br>
  Hotkeys: ⌃⇧S play/pause · ⌃⇧X stop · ⌃⇧R open this popup.</p>

  <div class="controls">
    <button id="btn-play"  title="Play">▶</button>
    <button id="btn-pause" title="Pause" disabled>⏸</button>
    <button id="btn-stop"  title="Stop"  disabled>⏹</button>
  </div>

  <div class="row">
    <label for="voice">Voice</label>
    <select id="voice"><option>Loading…</option></select>
  </div>

  <div class="row">
    <label for="speed">Speed</label>
    <input type="range" id="speed" min="0.5" max="2.5" step="0.1" value="1">
    <span id="speed-value">1.0×</span>
  </div>

  <div class="toggle-row">
    <span>Speed captions (one word at a time)</span>
    <input type="checkbox" id="rsvp">
  </div>

  <script src="popup.js"></script>
</body>
</html>
